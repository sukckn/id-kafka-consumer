apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-consumer
  namespace: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-consumer
  template:
    metadata:
      labels:
        app: kafka-consumer
    spec:
      containers:
        - name: kafka-consumer
          image: ghcr.io/sukckn/id-kafka-consumer:latest
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka-service.kafka.svc.cluster.local:9092
            - name: CONSUMER_SCR_audit_logger
              value: audit_logger:http://scr-write-log.scr.svc.cluster.local/write-log
            - name: CONSUMER_SCR_save_flow_vars
              value: save_flow_vars:http://scr-write-log.scr.svc.cluster.local/write-log
            - name: LOG_LEVEL
              value: INFO
            - name: POLL_INTERVAL
              value: "300000" # 5 minutes in milliseconds
